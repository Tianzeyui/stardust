name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust sidecar (release)
        run: cargo build --release --manifest-path stardust-engine/Cargo.toml

      - run: npm ci

      - name: Build frontend (${{ matrix.platform }})
        run: npx vite build

      - name: Package (${{ matrix.platform }})
        timeout-minutes: 30
        run: npx electron-builder --${{ matrix.platform }} --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Stardust-${{ matrix.platform }}
          path: release/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            ./release-assets/Stardust-mac/*.dmg \
            ./release-assets/Stardust-mac/*.zip \
            ./release-assets/Stardust-win/*.exe \
            ./release-assets/Stardust-win/*.zip \
            ./release-assets/Stardust-linux/*.AppImage \
            --draft \
            --generate-notes \
            --title "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ github.token }}
