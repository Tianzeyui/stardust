name: Build & Release

on:
  push:
    tags:
      - 'v*'           # 推送 v 开头的 tag 时触发
  workflow_dispatch:    # 手动触发

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - os: macos-latest
            platform: mac
            artifact: '*.dmg *.zip'
          - os: windows-latest
            platform: win
            artifact: '*.exe *.zip'
          - os: ubuntu-latest
            platform: linux
            artifact: '*.AppImage *.deb'

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: brainPlusDesktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: brainPlusDesktop/package-lock.json

      - run: npm ci

      - name: Build & Package (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BrainPlus-${{ matrix.platform }}
          path: brainPlusDesktop/release/${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BrainPlus-mac/*
            BrainPlus-win/*
            BrainPlus-linux/*
          draft: true
          generateReleaseNotes: true
