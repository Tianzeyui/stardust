<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 大光点发光 -->
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7EC8E3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7EC8E3" stop-opacity="0"/>
    </radialGradient>
    
    <!-- 中光点发光 -->
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    
    <!-- 小光点发光 -->
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD78A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD78A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ===== 大光点（冰蓝，偏左上） ===== -->
  <circle cx="22" cy="24" r="18" fill="url(#glow1)"/>
  <circle cx="22" cy="24" r="9" fill="#7EC8E3" opacity="0.15"/>
  <circle cx="22" cy="24" r="6" fill="#7EC8E3" opacity="0.3"/>
  <circle cx="22" cy="24" r="4.5" fill="#7EC8E3" opacity="0.95"/>
  <circle cx="20" cy="22" r="1.2" fill="#FFFFFF" opacity="0.6"/>

  <!-- ===== 中光点（白色，偏右上） ===== -->
  <circle cx="38" cy="30" r="14" fill="url(#glow2)"/>
  <circle cx="38" cy="30" r="6.5" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="38" cy="30" r="4" fill="#FFFFFF" opacity="0.25"/>
  <circle cx="38" cy="30" r="3.2" fill="#FFFFFF" opacity="0.92"/>
  <circle cx="36.8" cy="28.8" r="0.8" fill="#FFFFFF" opacity="0.7"/>

  <!-- ===== 小光点（暖金色，偏下） ===== -->
  <circle cx="30" cy="44" r="12" fill="url(#glow3)"/>
  <circle cx="30" cy="44" r="5" fill="#FFD78A" opacity="0.1"/>
  <circle cx="30" cy="44" r="3.5" fill="#FFD78A" opacity="0.25"/>
  <circle cx="30" cy="44" r="2.2" fill="#FFD78A" opacity="0.88"/>
  <circle cx="29" cy="43" r="0.6" fill="#FFFFFF" opacity="0.5"/>
</svg>